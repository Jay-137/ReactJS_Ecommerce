spring.application.name=backend
spring.config.import=optional:classpath:.env[.properties]
# JWT Configuration
# This is a 256-bit (32 character) secret key used to sign our tokens
jwt.secret=${JWT_SECRET}
# Token expiration time in milliseconds (86400000 ms = 24 hours)
jwt.expiration=${JWT_EXPIRY}

# File Upload Configuration
# Maximum file size for a single request
spring.servlet.multipart.max-file-size=5MB
# Maximum total request size
spring.servlet.multipart.max-request-size=5MB
# The folder name where we will save the images
file.upload-dir=uploads/

#mailService
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#mysql
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=required
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#stripe
stripe.api.key=${STRIPE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK}

